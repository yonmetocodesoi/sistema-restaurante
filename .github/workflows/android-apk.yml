name: Build Android APKs

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]
    paths:
      - "android/**"
      - ".github/workflows/android-apk.yml"

jobs:
  build-apks:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        flavor: [garcom, caixa, churrasco]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate Android wrapper files
        run: |
          ls -la
          ls -la android
          test -f android/gradlew
          test -f android/gradle/wrapper/gradle-wrapper.jar
          test -f android/gradle/wrapper/gradle-wrapper.properties

      - name: Ensure gradlew executable
        run: chmod +x android/gradlew

      - name: Build release APK
        working-directory: android
        run: ./gradlew app:assemble${{ matrix.flavor }}Release

      - name: Build debug APK
        working-directory: android
        run: ./gradlew app:assemble${{ matrix.flavor }}Debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ matrix.flavor }}-release
          path: android/app/build/outputs/apk/${{ matrix.flavor }}/release/*.apk

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ matrix.flavor }}-debug
          path: android/app/build/outputs/apk/${{ matrix.flavor }}/debug/*.apk
